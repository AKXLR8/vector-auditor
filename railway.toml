[build]
builder = "NIXPACKS"
buildCommand = "pip install torch --index-url https://download.pytorch.org/whl/cpu && pip install -r requirements.txt && python scripts/download_models.py"

[deploy]
startCommand = "gunicorn src.api.main:app --config gunicorn_conf.py --bind 0.0.0.0:$PORT"
releaseCommand = "alembic upgrade head"
healthcheckPath = "/readyz"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
